<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Nova Senha — Kart Setup</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/security-config.js" defer></script>

  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #111827;
      --bg-card: #020617;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.12);
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --border: #1f2937;
      --danger: #f97373;
      --info: #38bdf8;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }

    body {
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h1 {
      color: var(--accent);
      font-size: 28px;
      margin-bottom: 8px;
    }

    .logo p {
      color: var(--text-soft);
      font-size: 12px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      color: var(--text-soft);
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      padding: 12px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      font-size: 13px;
      text-align: center;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.1);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .message.error {
      background: rgba(249, 115, 115, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .message.info {
      background: rgba(56, 189, 248, 0.1);
      color: var(--info);
      border: 1px solid var(--info);
    }

    .links {
      text-align: center;
      margin-top: 16px;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
    }

    .links a:hover { text-decoration: underline; }

    .password-strength {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-soft);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">
      <h1>Kart Setup</h1>
      <p>Criar Nova Senha</p>
    </div>

    <div id="message-container"></div>

    <div id="form-container">
      <div class="form-group">
        <label for="password">Nova Senha</label>
        <input type="password" id="password" placeholder="•••••••••" required>
        <div class="password-strength">Mínimo 6 caracteres</div>
      </div>

      <div class="form-group">
        <label for="password-confirm">Confirmar Senha</label>
        <input type="password" id="password-confirm" placeholder="•••••••••" required>
      </div>

      <button id="btn-confirm" onclick="updatePassword()">Atualizar Senha</button>
    </div>

    <div class="links">
      <a href="/login.html">← Voltar para login</a>
    </div>
  </div>

  <script>
    let sb = null;

    // Aguarda APP_CONFIG ser carregado
    (async function initSupabase() {
      let attempts = 0;
      while (!window.APP_CONFIG && attempts < 50) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }

      if (!window.APP_CONFIG) {
        console.error('[SECURITY] Configuration not loaded');
        return;
      }

      sb = window.supabase.createClient(window.APP_CONFIG.SUPABASE_URL, window.APP_CONFIG.SUPABASE_ANON_KEY);
    })();

    // Verificar se há sessão de reset no URL
    (async function init() {
      const { data: { session } } = await sb.auth.getSession();

      if (!session) {
        showMessage('Link expirado ou inválido. Solicite um novo reset.', 'error');
        document.getElementById('form-container').style.display = 'none';
      } else {
        showMessage('Digite sua nova senha abaixo.', 'info');
      }
    })();

    function showMessage(text, type) {
      const container = document.getElementById('message-container');
      container.innerHTML = `<div class="message ${type}">${text}</div>`;
    }

    async function updatePassword() {
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('password-confirm').value;
      const btn = document.getElementById('btn-confirm');

      if (!password || !passwordConfirm) {
        showMessage('Preencha ambos os campos', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('Senha deve ter mínimo 6 caracteres', 'error');
        return;
      }

      if (password !== passwordConfirm) {
        showMessage('As senhas não correspondem', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Atualizando...';

      try {
        const { error } = await sb.auth.updateUser({ password });

        if (error) {
          showMessage(`Erro: ${error.message}`, 'error');
        } else {
          showMessage('Senha atualizada com sucesso! Redirecionando...', 'success');
          document.getElementById('form-container').style.display = 'none';
          setTimeout(() => {
            window.location.href = '/login.html?password-reset=success';
          }, 2000);
        }
      } catch (err) {
        showMessage('Erro ao atualizar senha. Tente novamente.', 'error');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Atualizar Senha';
      }
    }

    // Enter key para enviar
    document.getElementById('password-confirm').addEventListener('keypress', e => {
      if (e.key === 'Enter') updatePassword();
    });
  </script>
</body>
</html>

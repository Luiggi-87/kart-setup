<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resetar Senha — Kart Setup</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #111827;
      --bg-card: #020617;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.12);
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --border: #1f2937;
      --danger: #f97373;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }

    body {
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h1 {
      color: var(--accent);
      font-size: 28px;
      margin-bottom: 8px;
    }

    .logo p {
      color: var(--text-soft);
      font-size: 12px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      color: var(--text-soft);
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      padding: 12px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      font-size: 13px;
      text-align: center;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.1);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .message.error {
      background: rgba(249, 115, 115, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .links {
      text-align: center;
      margin-top: 16px;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
    }

    .links a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">
      <h1>Kart Setup</h1>
      <p>Resetar Senha</p>
    </div>

    <div id="message-container"></div>

    <div id="form-container">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu-email@exemplo.com" required>
      </div>

      <button id="btn-reset" onclick="sendReset()">Enviar Link de Reset</button>
    </div>

    <div class="links">
      <a href="/login.html">← Voltar para login</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://gkjxmsexixrjrvpwidvx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdranhtc2V4aXhyanJ2cHdpZHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTA4MzYsImV4cCI6MjA5MjAyNjgzNn0.LhXecxSU8luHOFi5OynG3Mn6Qo_mk-8PgscfiVUMs1I';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showMessage(text, type) {
      const container = document.getElementById('message-container');
      container.innerHTML = `<div class="message ${type}">${text}</div>`;
    }

    async function sendReset() {
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('btn-reset');

      if (!email) {
        showMessage('Por favor, insira seu email', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: 'https://kartsetup.com.br/reset-password-confirm.html'
        });

        if (error) {
          // Por segurança, mostrar mensagem genérica mesmo se email não existir
          showMessage('Se o email existe, você receberá um link de reset em breve.', 'success');
        } else {
          showMessage('Link de reset enviado! Verifique seu email.', 'success');
          document.getElementById('form-container').style.display = 'none';
        }
      } catch (err) {
        showMessage('Erro ao enviar. Tente novamente.', 'error');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar Link de Reset';
      }
    }

    // Enter key para enviar
    document.getElementById('email').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendReset();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Admin — Kart Setup</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/security-config.js" defer></script>

  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #111827;
      --bg-card: #020617;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.12);
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --border: #1f2937;
      --danger: #f97373;
      --info: #38bdf8;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }

    body {
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      visibility: hidden;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 16px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand h1 { color: var(--accent); font-size: 24px; }
    .brand .badge { background: var(--accent-soft); color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 12px; }

    .user-section { display: flex; align-items: center; gap: 12px; }
    .user-section span { color: var(--text-soft); }
    #btn-logout { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: var(--radius); cursor: pointer; }
    #btn-logout:hover { opacity: 0.9; }

    .navbar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-soft);
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }

    .nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .nav-btn:hover { color: var(--text); }

    .panel { display: none; }
    .panel.active { display: block; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }

    .stat-card .label { color: var(--text-soft); font-size: 12px; margin-bottom: 8px; }
    .stat-card .value { color: var(--accent); font-size: 32px; font-weight: bold; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    th {
      background: var(--bg-soft);
      padding: 12px;
      text-align: left;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    tr:last-child td { border-bottom: none; }

    .email { color: var(--accent); }
    .role { background: var(--accent-soft); color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status.active { background: rgba(34, 197, 94, 0.2); color: var(--accent); }
    .status.inactive { background: rgba(249, 115, 115, 0.2); color: var(--danger); }

    .actions { display: flex; gap: 8px; }
    .btn-sm {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-sm:hover { background: var(--border); }
    .btn-sm.danger { color: var(--danger); border-color: var(--danger); }
    .btn-sm.danger:hover { background: rgba(249, 115, 115, 0.1); }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-soft);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-soft);
    }
  </style>
</head>

<body>
  <script>
    // Guard imediato: apenas admin
    (async function adminGuard() {
      let attempts = 0;
      // Aguarda Supabase e Security Config carregarem
      while ((!window.supabase || !window.APP_CONFIG) && attempts < 100) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }

      if (!window.supabase || !window.APP_CONFIG) {
        console.error('[SECURITY] Failed to load Supabase or configuration');
        window.location.replace('/login.html');
        return;
      }

      try {
        const sb = window.supabase.createClient(
          window.APP_CONFIG.SUPABASE_URL,
          window.APP_CONFIG.SUPABASE_ANON_KEY
        );
        const { data: { session } } = await sb.auth.getSession();

        if (!session) {
          window.location.replace('/login.html');
          return;
        }

        // Server-side verification: Verificar role via função no backend
        // Por enquanto, verificamos client-side (deve ser movido para função)
        const { data: profile, error } = await sb.from('profiles')
          .select('role, email').eq('id', session.user.id).single();

        if (error || profile?.role !== 'admin') {
          console.warn('[SECURITY] Unauthorized admin access attempt', { userId: session.user.id });
          await auditLog('UNAUTHORIZED_ADMIN_ACCESS', { userId: session.user.id }, 'warn');
          window.location.replace('/app.html');
          return;
        }

        // Gera CSRF token
        generateCSRFToken();

        window._supabase = sb;
        window._currentUser = { id: session.user.id, email: escapeHtml(profile.email), role: 'admin' };
        window._sessionCreatedAt = Date.now();
        document.body.style.visibility = 'visible';
        initAdmin();
      } catch (error) {
        console.error('[SECURITY] Admin guard error:', error);
        window.location.replace('/login.html');
      }
    })();
  </script>

  <div class="container">
    <header>
      <div class="brand">
        <h1>🛠️ Admin</h1>
        <span class="badge">Painel de Administração</span>
      </div>
      <div class="user-section">
        <span id="user-email"></span>
        <button id="btn-back" style="background: var(--bg-soft); border: 1px solid var(--border); margin-right: 8px;">← App</button>
        <button id="btn-logout">Logout</button>
      </div>
    </header>

    <div class="navbar">
      <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
      <button class="nav-btn" data-tab="usuarios">Usuários</button>
      <button class="nav-btn" data-tab="assinaturas">Assinaturas</button>
    </div>

    <!-- DASHBOARD -->
    <div id="panel-dashboard" class="panel active">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Total de Usuários</div>
          <div class="value" id="stat-total-users">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Assinaturas Ativas</div>
          <div class="value" id="stat-active-subs">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Em Trial</div>
          <div class="value" id="stat-trial-subs">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Setups Registrados</div>
          <div class="value" id="stat-total-setups">—</div>
        </div>
      </div>
    </div>

    <!-- USUÁRIOS -->
    <div id="panel-usuarios" class="panel">
      <div id="usuarios-content" class="loading">Carregando usuários...</div>
    </div>

    <!-- ASSINATURAS -->
    <div id="panel-assinaturas" class="panel">
      <div id="assinaturas-content" class="loading">Carregando assinaturas...</div>
    </div>
  </div>

  <script>
    const sb = () => window._supabase;

    // DOM Construction Helper: Safe table row creation
    function createTableRow(user, rowType = 'usuarios') {
      const tr = document.createElement('tr');

      if (rowType === 'usuarios') {
        const subStatus = user.subscription_status === 'active' ? 'Ativa' : user.subscription_status === 'trial' ? 'Trial' : 'Inativa';
        const subStatusClass = user.subscription_status === 'active' || user.subscription_status === 'trial' ? 'active' : 'inactive';
        const createdAt = new Date(user.created_at).toLocaleDateString('pt-BR');

        // Email (safe)
        const tdEmail = document.createElement('td');
        tdEmail.className = 'email';
        tdEmail.textContent = escapeHtml(user.email);
        tr.appendChild(tdEmail);

        // Role (safe)
        const tdRole = document.createElement('td');
        const spanRole = document.createElement('span');
        spanRole.className = 'role';
        spanRole.textContent = escapeHtml(user.role);
        tdRole.appendChild(spanRole);
        tr.appendChild(tdRole);

        // Status (safe)
        const tdStatus = document.createElement('td');
        const spanStatus = document.createElement('span');
        spanStatus.className = `status ${subStatusClass}`;
        spanStatus.textContent = subStatus;
        tdStatus.appendChild(spanStatus);
        tr.appendChild(tdStatus);

        // Created At (safe)
        const tdCreated = document.createElement('td');
        tdCreated.textContent = createdAt;
        tr.appendChild(tdCreated);

        // Actions (safe)
        const tdActions = document.createElement('td');
        tdActions.className = 'actions';
        const btnRole = document.createElement('button');
        btnRole.className = 'btn-sm';
        btnRole.textContent = user.role === 'admin' ? 'Remover Admin' : 'Fazer Admin';
        btnRole.addEventListener('click', () => {
          // Check rate limit
          if (!checkRateLimit('admin_role_change')) {
            alert('Muitas tentativas. Aguarde alguns segundos.');
            return;
          }
          changeRole(user.id, user.role);
        });
        tdActions.appendChild(btnRole);

        const btnDelete = document.createElement('button');
        btnDelete.className = 'btn-sm danger';
        btnDelete.textContent = 'Deletar';
        btnDelete.addEventListener('click', () => {
          if (!checkRateLimit('admin_delete')) {
            alert('Muitas tentativas. Aguarde alguns segundos.');
            return;
          }
          deleteUser(user.id, user.email);
        });
        tdActions.appendChild(btnDelete);
        tr.appendChild(tdActions);
      } else if (rowType === 'assinaturas') {
        const status = user.subscription_status === 'active' ? 'Ativa' : user.subscription_status === 'trial' ? 'Trial' : 'Inativa';
        const endDate = user.subscription_status === 'trial' ? user.trial_ends_at : user.current_period_end;
        const endDateStr = endDate ? new Date(endDate).toLocaleDateString('pt-BR') : '—';
        const statusClass = user.subscription_status === 'inactive' ? 'inactive' : 'active';

        // Email (safe)
        const tdEmail = document.createElement('td');
        tdEmail.className = 'email';
        tdEmail.textContent = escapeHtml(user.email);
        tr.appendChild(tdEmail);

        // Status (safe)
        const tdStatus = document.createElement('td');
        const spanStatus = document.createElement('span');
        spanStatus.className = `status ${statusClass}`;
        spanStatus.textContent = status;
        tdStatus.appendChild(spanStatus);
        tr.appendChild(tdStatus);

        // End Date (safe)
        const tdEndDate = document.createElement('td');
        tdEndDate.textContent = endDateStr;
        tr.appendChild(tdEndDate);

        // Actions (safe)
        const tdActions = document.createElement('td');
        tdActions.className = 'actions';
        const btnActivate = document.createElement('button');
        btnActivate.className = 'btn-sm';
        btnActivate.textContent = 'Ativar';
        btnActivate.addEventListener('click', () => {
          if (!checkRateLimit('admin_activate')) {
            alert('Muitas tentativas. Aguarde alguns segundos.');
            return;
          }
          activateUser(user.id);
        });
        tdActions.appendChild(btnActivate);

        const btnCancel = document.createElement('button');
        btnCancel.className = 'btn-sm danger';
        btnCancel.textContent = 'Cancelar';
        btnCancel.addEventListener('click', () => {
          if (!checkRateLimit('admin_cancel')) {
            alert('Muitas tentativas. Aguarde alguns segundos.');
            return;
          }
          cancelSub(user.id);
        });
        tdActions.appendChild(btnCancel);
        tr.appendChild(tdActions);
      }

      return tr;
    }

    function initAdmin() {
      document.getElementById('user-email').textContent = window._currentUser.email;

      document.getElementById('btn-back').addEventListener('click', () => {
        window.location.href = '/app.html';
      });

      document.getElementById('btn-logout').addEventListener('click', async () => {
        await sb().auth.signOut();
        clearToken();
        window.location.replace('/login.html');
      });

      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');

          if (btn.dataset.tab === 'usuarios') loadUsuarios();
          if (btn.dataset.tab === 'assinaturas') loadAssinaturas();
          if (btn.dataset.tab === 'dashboard') loadDashboard();
        });
      });

      loadDashboard();
    }

    async function loadDashboard() {
      const { data: allProfiles } = await sb().from('profiles').select('id, subscription_status, trial_ends_at, current_period_end');
      const { data: allSetups } = await sb().from('setups').select('id');

      const now = new Date();
      const activeCount = allProfiles.filter(p => {
        if (p.subscription_status !== 'active') return false;
        const endDate = new Date(p.current_period_end);
        return endDate > now;
      }).length;

      const trialCount = allProfiles.filter(p => {
        if (p.subscription_status !== 'trial') return false;
        const endDate = new Date(p.trial_ends_at);
        return endDate > now;
      }).length;

      document.getElementById('stat-total-users').textContent = allProfiles?.length || 0;
      document.getElementById('stat-active-subs').textContent = activeCount;
      document.getElementById('stat-trial-subs').textContent = trialCount;
      document.getElementById('stat-total-setups').textContent = allSetups?.length || 0;
    }

    async function loadUsuarios() {
      const container = document.getElementById('usuarios-content');

      try {
        const { data: users, error } = await sb().from('profiles').select('*').order('created_at', { ascending: false });

        if (error) {
          container.textContent = '';
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Erro ao carregar usuários';
          container.appendChild(empty);
          return;
        }

        if (!users || users.length === 0) {
          container.textContent = '';
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Nenhum usuário encontrado';
          container.appendChild(empty);
          return;
        }

        // Clear container
        container.textContent = '';

        // Create table (safe)
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');

        const headers = ['Email', 'Role', 'Status Assinatura', 'Data Criação', 'Ações'];
        headers.forEach(headerText => {
          const th = document.createElement('th');
          th.textContent = headerText;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        users.forEach(user => {
          const tr = createTableRow(user, 'usuarios');
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);

        container.appendChild(table);
      } catch (error) {
        console.error('[SECURITY] Error loading users:', error);
        await auditLog('LOAD_USUARIOS_ERROR', { error: error.message }, 'error');
        container.textContent = '';
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Erro ao carregar dados';
        container.appendChild(empty);
      }
    }

    async function loadAssinaturas() {
      const container = document.getElementById('assinaturas-content');

      try {
        const { data: users, error } = await sb().from('profiles')
          .select('id, email, subscription_status, trial_ends_at, current_period_end')
          .order('created_at', { ascending: false });

        if (error || !users || users.length === 0) {
          container.textContent = '';
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Nenhuma assinatura encontrada';
          container.appendChild(empty);
          return;
        }

        // Clear container
        container.textContent = '';

        // Create table (safe)
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');

        const headers = ['Email', 'Status', 'Data Vencimento', 'Ações'];
        headers.forEach(headerText => {
          const th = document.createElement('th');
          th.textContent = headerText;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        users.forEach(user => {
          const tr = createTableRow(user, 'assinaturas');
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);

        container.appendChild(table);
      } catch (error) {
        console.error('[SECURITY] Error loading subscriptions:', error);
        await auditLog('LOAD_ASSINATURAS_ERROR', { error: error.message }, 'error');
        container.textContent = '';
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Erro ao carregar dados';
        container.appendChild(empty);
      }
    }

    async function changeRole(userId, currentRole) {
      // Validate input
      if (!userId || typeof userId !== 'string' || userId.length === 0) {
        alert('ID de usuário inválido');
        return;
      }

      const newRole = currentRole === 'admin' ? 'user' : 'admin';
      if (!confirm(`Deseja ${newRole === 'admin' ? 'promover para admin' : 'remover privilégios de admin'}?`)) return;

      try {
        const { error } = await sb().from('profiles').update({ role: newRole }).eq('id', userId);
        if (error) {
          alert(`Erro: ${error.message}`);
          await auditLog('CHANGE_ROLE_ERROR', { targetUserId: userId, newRole, error: error.message }, 'error');
        } else {
          await auditLog('CHANGE_ROLE_SUCCESS', { targetUserId: userId, newRole }, 'info');
          loadUsuarios();
        }
      } catch (err) {
        console.error('[SECURITY] Error changing role:', err);
        alert('Erro ao alterar role');
        await auditLog('CHANGE_ROLE_EXCEPTION', { targetUserId: userId, error: err.message }, 'error');
      }
    }

    async function deleteUser(userId, email) {
      // Validate input
      if (!userId || typeof userId !== 'string' || userId.length === 0) {
        alert('ID de usuário inválido');
        return;
      }

      const sanitizedEmail = escapeHtml(email);
      if (!confirm(`⚠️ Deletar permanentemente ${sanitizedEmail}? Esta ação não pode ser desfeita.`)) return;

      try {
        const { error } = await sb().from('profiles').delete().eq('id', userId);
        if (error) {
          alert(`Erro: ${error.message}`);
          await auditLog('DELETE_USER_ERROR', { targetUserId: userId, email: sanitizedEmail, error: error.message }, 'error');
        } else {
          await auditLog('DELETE_USER_SUCCESS', { targetUserId: userId, email: sanitizedEmail }, 'warn');
          loadUsuarios();
          loadDashboard();
        }
      } catch (err) {
        console.error('[SECURITY] Error deleting user:', err);
        alert('Erro ao deletar usuário');
        await auditLog('DELETE_USER_EXCEPTION', { targetUserId: userId, error: err.message }, 'error');
      }
    }

    async function activateUser(userId) {
      // Validate input
      if (!userId || typeof userId !== 'string' || userId.length === 0) {
        alert('ID de usuário inválido');
        return;
      }

      try {
        const endDate = new Date();
        endDate.setDate(endDate.getDate() + 30);

        const { error } = await sb().from('profiles').update({
          subscription_status: 'active',
          current_period_end: endDate.toISOString()
        }).eq('id', userId);

        if (error) {
          alert(`Erro: ${error.message}`);
          await auditLog('ACTIVATE_USER_ERROR', { targetUserId: userId, error: error.message }, 'error');
        } else {
          await auditLog('ACTIVATE_USER_SUCCESS', { targetUserId: userId }, 'info');
          loadAssinaturas();
          loadDashboard();
        }
      } catch (err) {
        console.error('[SECURITY] Error activating user:', err);
        alert('Erro ao ativar usuário');
        await auditLog('ACTIVATE_USER_EXCEPTION', { targetUserId: userId, error: err.message }, 'error');
      }
    }

    async function cancelSub(userId) {
      // Validate input
      if (!userId || typeof userId !== 'string' || userId.length === 0) {
        alert('ID de usuário inválido');
        return;
      }

      if (!confirm('Deseja cancelar a assinatura?')) return;

      try {
        const { error } = await sb().from('profiles').update({
          subscription_status: 'cancelled'
        }).eq('id', userId);

        if (error) {
          alert(`Erro: ${error.message}`);
          await auditLog('CANCEL_SUB_ERROR', { targetUserId: userId, error: error.message }, 'error');
        } else {
          await auditLog('CANCEL_SUB_SUCCESS', { targetUserId: userId }, 'warn');
          loadAssinaturas();
          loadDashboard();
        }
      } catch (err) {
        console.error('[SECURITY] Error canceling subscription:', err);
        alert('Erro ao cancelar assinatura');
        await auditLog('CANCEL_SUB_EXCEPTION', { targetUserId: userId, error: err.message }, 'error');
      }
    }
  </script>
</body>
</html>
